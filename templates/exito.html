<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-Gol Watch — ¡Éxito!</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>

<header>
    <span class="logo">⚽</span>
    <div>
        <h1>Pro-Gol Watch</h1>
        <p>Sube tus videos de fútbol favoritos</p>
    </div>
</header>

<div class="container">
    <div class="card exito-container">
        <div class="check"><i class="bi bi-check-circle-fill" style="color: #00c853;"></i></div>
        <h1>¡Videos guardados!</h1>
        <p>La información se guardó correctamente en la base de datos <strong>Pro_Gol</strong>.</p>
        <a href="{% url 'index' %}"><i class="bi bi-plus-circle" style="color: #0b0a0a;" ></i> Subir más videos</a>
    </div>
</div>

<footer>
    Pro-Gol Watch © 2024 — Backend con Python/Django
</footer>

</body>
</html>
